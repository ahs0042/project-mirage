apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: mirage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: ghcr.io/ahs0042/mirage-catalog-service:latest
          ports:
            - containerPort: 8002
