name: Mirage Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (example: latest or full commit SHA)"
        required: true
        default: "latest"

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/mirage_key
          chmod 600 ~/.ssh/mirage_key

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Roll back Mirage on EC2
        run: |
          ssh -i ~/.ssh/mirage_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            cd ~/mirage
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.inputs.image_tag }}/' .env
            cat .env
            docker-compose pull
            docker-compose up -d
            docker ps
          EOF
