name: Mirage CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            path: ./services/auth-service
          - name: catalog-service
            path: ./services/catalog-service
          - name: recommendation-service
            path: ./services/recommendation-service
          - name: api-gateway
            path: ./api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.path }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mirage-${{ matrix.service.name }}:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Start SSH agent
        run: |
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/mirage_key
          chmod 600 ~/.ssh/mirage_key

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Mirage on EC2
        run: |
          ssh -i ~/.ssh/mirage_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/mirage
            docker-compose pull
            docker-compose up -d
            docker ps
          EOF
